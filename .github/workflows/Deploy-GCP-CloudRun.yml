# .github/workflows/deploy-cloudrun.yml
name: Deploy NestJS to GCP Cloud Run

on:
  workflow_call:
    inputs:
      # Repository inputs
      tag_name:
        description: >
          Git tag to deploy. Leave empty or pass "latest" to automatically
          resolve the most recent tag reachable from source_branch.
        required: false
        type: string
        default: 'latest'
      source_branch:
        description: >
          Branch used to find the latest tag when tag_name is empty or "latest".
          Only tags whose commits are ancestors of this branch are considered.
        required: false
        type: string
        default: 'main'
      repo_name:
        required: true
        type: string
        description: 'Repository name'
      repo_owner_name:
        required: true
        type: string
        description: 'Repository owner'
      image_name:
        description: 'name of the docker image'
        type: string
        required: true
      registry:
        required: false
        description: 'Docker registry'
        type: string
        default: 'docker.io'
      
      # Environment inputs
      environment_name:
        required: true
        type: string
        description: 'GitHub environment name (e.g., production, staging)'
      environment_url:
        required: false
        type: string
        description: 'Environment URL for GitHub deployments'
      
      # Cloud Run inputs
      service_name:
        required: true
        type: string
        description: 'Cloud Run service name'
      region:
        required: false
        type: string
        default: 'us-central1'
        description: 'GCP region'
      
      # Doppler inputs
      doppler_project:
        required: true
        type: string
        description: 'Doppler project name'
      doppler_config:
        required: true
        type: string
        description: 'Doppler config (e.g., prd, stg)'
      
      # Resource limits
      min_instances:
        required: false
        type: number
        default: 0
        description: 'Minimum instances (0 for free tier)'
      max_instances:
        required: false
        type: number
        default: 1
        description: 'Maximum instances'
      memory:
        required: false
        type: string
        default: '512Mi'
        description: 'Memory limit (512Mi for free tier)'
      cpu:
        required: false
        type: string
        default: '1'
        description: 'CPU limit'
      timeout:
        required: false
        type: number
        default: 300
        description: 'Request timeout in seconds'
      port:
        required: false
        type: number
        default: 3000
        description: 'Application port'
      
      # Deployment options
      enable_health_check:
        description: "Enable post-deployment health check"
        required: false
        type: boolean
        default: true
      health_check_path:
        description: "Health check endpoint path"
        required: false
        type: string
        default: '/health'
      
      # Build options
      node_version:
        description: "Node.js version to use"
        required: false
        type: string
        default: '20'
      enable_build_cache:
        description: "Enable Docker build cache"
        required: false
        type: boolean
        default: true
      
    outputs:
      # Build outputs
      build_status:
        description: 'Status of the build process'
        value: ${{ jobs.build_and_push.result }}
      image_tag:
        description: 'Docker image tag'
        value: ${{ jobs.build_and_push.outputs.image_tag }}
      
      # Deployment outputs
      deployment_status:
        description: 'Status of the deployment process'
        value: ${{ jobs.deploy_to_cloudrun.result }}
      deployment_id:
        description: 'GitHub deployment ID'
        value: ${{ jobs.deploy_to_cloudrun.outputs.deployment_id }}
      service_url:
        description: 'Cloud Run service URL'
        value: ${{ jobs.deploy_to_cloudrun.outputs.service_url }}
      
      # Summary outputs
      overall_status:
        description: 'Overall workflow execution status'
        value: ${{ (jobs.build_and_push.result == 'success' && jobs.deploy_to_cloudrun.result == 'success') && 'success' || 'failure' }}
      deployment_summary:
        description: 'Deployment summary information'
        value: 'Tag: ${{ jobs.build_and_push.outputs.resolved_tag }} | Service: ${{ inputs.service_name }} | Region: ${{ inputs.region }} | Environment: ${{ inputs.environment_name }}'
    
    secrets:
      GCP_PROJECT_ID:
        required: true
      GCP_SA_KEY:
        required: true
      DOPPLER_TOKEN:
        required: true
      REPO_TOKEN:
        required: true
      DOCKER_USER:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  build_and_push:
    name: 'Build and Push Docker Image'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment_name }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image_meta.outputs.tag }}
      image_name: ${{ steps.image_meta.outputs.name }}
      docker_image: ${{ steps.image_meta.outputs.full }}
      resolved_tag: ${{ steps.resolve_tag.outputs.resolved_tag }}
    
    steps:
      - name: Resolve deploy tag
        id: resolve_tag
        uses: nabarun-ngo/ngo-nabarun-templates/.github/actions/resolve-deploy-tag@main
        with:
          tag_name: ${{ inputs.tag_name }}
          repository: '${{ inputs.repo_owner_name }}/${{ inputs.repo_name }}'
          source_branch: ${{ inputs.source_branch }}
          token: ${{ secrets.REPO_TOKEN }}

      - name: Checkout repository | Tag ${{ steps.resolve_tag.outputs.resolved_tag }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_tag.outputs.resolved_tag }}
          repository: '${{ inputs.repo_owner_name }}/${{ inputs.repo_name }}'
          fetch-depth: 0
          token: ${{ secrets.REPO_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
      
      - name: Log in to Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Generate image metadata
        id: image_meta
        run: |
          REGISTRY="${{ inputs.registry }}"
          IMAGE_NAME="${REGISTRY}/${{ inputs.image_name }}"
          IMAGE_TAG="${{ steps.resolve_tag.outputs.resolved_tag }}"
          
          echo "name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full=${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          
          echo "📦 Image: ${IMAGE_NAME}:${IMAGE_TAG}"

          echo "📦 Checking if Image: ${IMAGE_NAME}:${IMAGE_TAG} exists in ${REGISTRY}"
          if docker manifest inspect ${IMAGE_NAME}:${IMAGE_TAG} > /dev/null; then
            echo "Image exists."
            echo "exists=Y" >> $GITHUB_OUTPUT
          else
            echo "Image does not exist."
            echo "exists=N" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Docker Buildx (if cache enabled)
        if: ${{ inputs.enable_build_cache && steps.image_meta.outputs.exists == 'N' }}
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Docker image
        if: ${{ steps.image_meta.outputs.exists == 'N' }}
        run: |
          IMAGE_NAME="${{ steps.image_meta.outputs.name }}"
          IMAGE_TAG="${{ steps.image_meta.outputs.tag }}"
          
          echo "🔨 Building Docker image..."
          docker build \
            --tag ${IMAGE_NAME}:${IMAGE_TAG} \
            --tag ${IMAGE_NAME}:latest \
            --label "org.opencontainers.image.source=https://github.com/${{ inputs.repo_owner_name }}/${{ inputs.repo_name }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ steps.resolve_tag.outputs.resolved_tag }}" \
            .
          
          echo "📦 Pushing Docker image..."
          docker push ${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${IMAGE_NAME}:latest
          
          echo "✅ Image pushed successfully"
      
      - name: Image size and security scan
        if: ${{ steps.image_meta.outputs.exists == 'N' }}
        run: |
          IMAGE_NAME="${{ steps.image_meta.outputs.name }}"
          IMAGE_TAG="${{ steps.image_meta.outputs.tag }}"
          
          echo "📊 Image Size:"
          docker images ${IMAGE_NAME}:${IMAGE_TAG} --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
          
          echo ""
          echo "🔍 Image Layers:"
          docker history ${IMAGE_NAME}:${IMAGE_TAG} --human=true --no-trunc=false | head -10
      
  run_migrations:
    name: Run Database Migration
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: 
      name: ${{ inputs.environment_name }}
      url: ${{ inputs.environment_url }} 
    steps:
      - name: Run database migrations
        run: |
          IMAGE_NAME="${{ inputs.registry }}/${{ inputs.image_name }}"
          IMAGE_TAG="${{ needs.build_and_push.outputs.image_tag }}"
          echo "Running migration from ${IMAGE_NAME}:${IMAGE_TAG}"
          docker run --rm \
            --entrypoint ./migrate.sh \
            -e DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }} \
            -e DOPPLER_PROJECT=${{ inputs.doppler_project }} \
            -e DOPPLER_CONFIG=${{ inputs.doppler_config }} \
            ${IMAGE_NAME}:${IMAGE_TAG}

  deploy_to_cloudrun:
    name: 'Deploy to Cloud Run'
    runs-on: ubuntu-latest
    needs: [build_and_push,run_migrations]
    if: |
      always() &&
      needs.build_and_push.result == 'success' &&
      needs.run_migrations.result == 'success'
    environment: 
      name: ${{ inputs.environment_name }}
      url: ${{ inputs.environment_url }}
    outputs:
      deployment_id: ${{ steps.deployment.outputs.deployment_id }}
      service_url: ${{ steps.get_url.outputs.url }}
    
    steps:
      - name: Create GitHub Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: ${{ secrets.REPO_TOKEN }}
          environment-url: ${{ inputs.environment_url }}
          environment: ${{ inputs.environment_name }}
          repo: ${{ inputs.repo_name }}
          owner: ${{ inputs.repo_owner_name }}
          ref: ${{ needs.build_and_push.outputs.resolved_tag }}
          description: 'Deploying ${{ needs.build_and_push.outputs.resolved_tag }} to Cloud Run'
            
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          IMAGE_NAME="${{ inputs.registry }}/${{ inputs.image_name }}"
          IMAGE_TAG="${{ needs.build_and_push.outputs.image_tag }}"
          # Extract client_email from SA JSON
          SERVICE_ACCOUNT_EMAIL=$(echo '${{ secrets.GCP_SA_KEY }}' | jq -r '.client_email')
          echo "🚀 Deploying ${IMAGE_NAME}:${IMAGE_TAG} to Cloud Run using ${SERVICE_ACCOUNT_EMAIL}..."
          
          gcloud run deploy ${{ inputs.service_name }} \
            --image ${IMAGE_NAME}:${IMAGE_TAG} \
            --platform managed \
            --region ${{ inputs.region }} \
            --allow-unauthenticated \
            --min-instances ${{ inputs.min_instances }} \
            --max-instances ${{ inputs.max_instances }} \
            --memory ${{ inputs.memory }} \
            --cpu ${{ inputs.cpu }} \
            --timeout ${{ inputs.timeout }} \
            --service-account ${SERVICE_ACCOUNT_EMAIL} \
            --set-env-vars "DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }},DOPPLER_PROJECT=${{ inputs.doppler_project }},DOPPLER_CONFIG=${{ inputs.doppler_config }},VERSION=${{ needs.build_and_push.outputs.resolved_tag }},NODE_ENV=${{ inputs.environment_name }}" \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Get service URL
        id: get_url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ inputs.service_name }} \
            --region=${{ inputs.region }} \
            --format='value(status.url)' \
            --project=${{ secrets.GCP_PROJECT_ID }})
          
          echo "url=${SERVICE_URL}" >> $GITHUB_OUTPUT
          echo "✅ Service deployed to: ${SERVICE_URL}"

      - name: Wait for service to be ready
        run: sleep 30

      - name: Health check deployment
        if: inputs.enable_health_check
        uses: nabarun-ngo/ngo-nabarun-templates/.github/actions/gcp-health-check-deployment@main
        with:
          environment_url: ${{ steps.get_url.outputs.url }}
          health_check_path: ${{ inputs.health_check_path }}
          max_attempts: '10'
          retry_delay: '10'

      - name: Get deployment details
        if: always()
        run: |
          echo "📋 Deployment Details:"
          gcloud run services describe ${{ inputs.service_name }} \
            --region=${{ inputs.region }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='table(
              metadata.name,
              status.url,
              status.latestReadyRevisionName,
              spec.template.spec.containers[0].image,
              metadata.labels
            )'

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          token: ${{ secrets.REPO_TOKEN }}
          environment-url: ${{ steps.get_url.outputs.url }}
          repo: ${{ inputs.repo_name }}
          owner: ${{ inputs.repo_owner_name }}

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          token: ${{ secrets.REPO_TOKEN }}
          environment-url: ${{ inputs.environment_url }}
          repo: ${{ inputs.repo_name }}
          owner: ${{ inputs.repo_owner_name }}

  clean_gcp_resources:
    name: 'Clean Up Old GCP Resources'
    runs-on: ubuntu-latest
    needs: [deploy_to_cloudrun]
    environment: ${{ inputs.environment_name }}
    # Only run cleanup when deployment succeeds
    if: needs.deploy_to_cloudrun.result == 'success'
    timeout-minutes: 20
    steps:
      - name: Setup Google Cloud CLI
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Clean Artifact Registry repositories
        uses: nabarun-ngo/ngo-nabarun-templates/.github/actions/gcp-clean-artifact-registry@main
        continue-on-error: true
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Clean old GCR versions
        uses: nabarun-ngo/ngo-nabarun-templates/.github/actions/gcp-clean-gcr-versions@main
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_name: ${{ inputs.service_name }}
          region: ${{ inputs.region }}
          keep_revisions: '1'

      - name: Clean old GCS files
        uses: nabarun-ngo/ngo-nabarun-templates/.github/actions/gcp-clean-gcs-files@main
        continue-on-error: true
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          keep_days: '5'
          bucket_patterns: 'auto'
          timeout_minutes: '10'

  

     
