name: "QMetry Result Linker"
description: "Generates QMetry execution URL and caches variables for workflow re-runs"

inputs:
  qmetry_open_api_key:
    description: "QMetry Open API key"
    required: true

  test_cycle_summary:
    description: "Test cycle summary to search"
    required: true

  app_execution_url:
    description: "Execution URL template containing {executionId}"
    required: true

  workflow_name:
    description: "GitHub workflow name"
    required: true

  run_id:
    description: "GitHub run id"
    required: true

  cache_file_path:
    description: "Cache file path"
    required: false
    default: "variables.env"

outputs:
  execution_url:
    description: "Generated execution URL"
    value: ${{ steps.generate.outputs.execution_url }}

  execution_id:
    description: "Execution ID"
    value: ${{ steps.generate.outputs.execution_id }}

  test_cycle:
    description: "Test cycle key"
    value: ${{ steps.generate.outputs.test_cycle }}

  cache_key:
    description: "Cache key"
    value: ${{ steps.cache.outputs.cache_key }}

runs:
  using: "composite"
  steps:

    - name: Initialize
      shell: bash
      run: |
        echo "🔗 QMetry Result Linker"
        echo "Test Cycle Summary: ${{ inputs.test_cycle_summary }}"
        echo "Workflow: ${{ inputs.workflow_name }}"
        echo "Run ID: ${{ inputs.run_id }}"
        echo ""

    - name: Retrieve test cycle
      id: qmetry
      uses: fjogeleit/http-request-action@v1
      with:
        url: "https://qtmcloud.qmetry.com/rest/api/latest/testcycles/search/?fields=key,id"
        method: POST
        customHeaders: '{"Content-Type": "application/json","apiKey":"${{ inputs.qmetry_open_api_key }}"}'
        data: |
          {
            "filter": {
              "summary": "${{ inputs.test_cycle_summary }}",
              "isAutomated": true
            }
          }

    - name: Process response and generate execution URL
      id: generate
      shell: bash
      run: |
        RESPONSE='${{ steps.qmetry.outputs.response }}'

        echo "📡 QMetry Response:"
        echo "$RESPONSE" | jq '.' || echo "$RESPONSE"

        COUNT=$(echo "$RESPONSE" | jq '.data | length')

        if [[ "$COUNT" -eq 0 ]]; then
          echo "❌ No test cycle found"
          exit 1
        fi

        EXECUTION_ID=$(echo "$RESPONSE" | jq -r '.data[0].id')
        TEST_CYCLE=$(echo "$RESPONSE" | jq -r '.data[0].key')

        echo "✅ Test Cycle: $TEST_CYCLE"
        echo "Execution ID: $EXECUTION_ID"

        EXECUTION_URL="${{ inputs.app_execution_url }}"
        EXECUTION_URL="${EXECUTION_URL/\{executionId\}/$EXECUTION_ID}"

        echo "🔗 Execution URL:"
        echo "$EXECUTION_URL"

        echo "execution_url=$EXECUTION_URL" >> $GITHUB_OUTPUT
        echo "execution_id=$EXECUTION_ID" >> $GITHUB_OUTPUT
        echo "test_cycle=$TEST_CYCLE" >> $GITHUB_OUTPUT

        cat > "${{ inputs.cache_file_path }}" <<EOF
        execution_id=$EXECUTION_ID
        test_cycle=$TEST_CYCLE
        workflow=${{ inputs.workflow_name }}
        run_id=${{ inputs.run_id }}
        created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        EOF

    - name: Cache variables
      id: cache
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.cache_file_path }}
        key: cache-variables-${{ inputs.workflow_name }}-${{ inputs.run_id }}

    - name: Set cache key output
      shell: bash
      run: |
        CACHE_KEY="cache-variables-${{ inputs.workflow_name }}-${{ inputs.run_id }}"
        echo "cache_key=$CACHE_KEY" >> $GITHUB_OUTPUT

    - name: Execution summary
      shell: bash
      run: |
        echo "--------------------------------"
        echo "🧪 QMetry Execution Summary"
        echo "Test Cycle : ${{ steps.generate.outputs.test_cycle }}"
        echo "Execution ID : ${{ steps.generate.outputs.execution_id }}"
        echo "Execution URL:"
        echo "${{ steps.generate.outputs.execution_url }}"
        echo "--------------------------------"
