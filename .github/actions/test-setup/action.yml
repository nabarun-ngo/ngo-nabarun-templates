name: 'Test Environment Setup'
description: 'Sets up Java, caches Maven dependencies, and checks out required repositories'
inputs:
  java_version:
    description: 'Java version to use'
    required: false
    default: '22'
  templates_repository:
    description: 'Templates repository (org/repo). Defaults to the repository this action lives in.'
    required: false
    default: ''
  test_repository:
    description: 'Test repository'
    required: true
  test_branch:
    description: 'Test repository branch'
    required: false
    default: 'main'
  templates_path:
    description: 'Path to checkout templates repository'
    required: false
    default: 'actions'
  test_path:
    description: 'Path to checkout test repository'
    required: false
    default: 'test'
  enable_maven_cache:
    description: 'Whether to enable Maven dependency caching'
    required: false
    default: 'true'
  server_id:
    description: 'The server id'
    required: false
    default: 'github'
    
outputs:
  java_version:
    description: 'Java version that was set up'
    value: ${{ inputs.java_version }}
  cache_hit:
    description: 'Whether Maven cache was hit'
    value: ${{ steps.setup_java.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Initialize test environment setup
      shell: bash
      run: |
        echo "⚙️ Test Environment Setup"
        echo "  Java version        : ${{ inputs.java_version }}"
        echo "  Templates repo      : ${{ inputs.templates_repository || github.action_repository }}"
        echo "  Templates path      : ${{ inputs.templates_path }}"
        echo "  Test repo           : ${{ inputs.test_repository }}"
        echo "  Test branch         : ${{ inputs.test_branch }}"
        echo "  Test path           : ${{ inputs.test_path }}"
        echo "  Maven cache enabled : ${{ inputs.enable_maven_cache }}"

    - name: Checkout template repository
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.templates_repository || github.action_repository }}
        path: ${{ inputs.templates_path }}

    - name: Checkout test repository
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.test_repository }}
        ref: ${{ inputs.test_branch }}
        path: ${{ inputs.test_path }}

    - name: Set up Java
      id: setup_java
      uses: actions/setup-java@v3
      with:
        java-version: ${{ inputs.java_version }}
        distribution: 'temurin'
        cache: 'maven'
        server-id: ${{ inputs.server_id }}
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - name: Install system dependencies
      shell: bash
      run: |
        if command -v apt-get >/dev/null 2>&1; then
          echo "📦 Installing jq on Ubuntu/Debian..."
          sudo apt-get update && sudo apt-get install -y jq
        elif command -v choco >/dev/null 2>&1; then
          echo "📦 Installing jq on Windows via Chocolatey..."
          choco install jq -y
        else
          echo "⚠️ Package manager not found, jq may need to be installed manually"
        fi
        echo "✅ System dependencies setup completed"

    - name: Setup summary
      shell: bash
      run: |
        echo "✅ Test environment ready"
        echo "  Java    : ${{ inputs.java_version }}"
        echo "  Templates → ${{ inputs.templates_path }}/"
        echo "  Tests   → ${{ inputs.test_path }}/ (branch: ${{ inputs.test_branch }})"
